<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I miei Appuntamenti | Offline</title>
    <meta name="description" content="Gestione appuntamenti offline - nessuna connessione necessaria">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3F51B5">
    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Appuntamenti">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <!-- Splash screens iOS -->
    <link rel="apple-touch-startup-image" href="icons/icon-512.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <div class="logo-area">
                <div class="logo-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </svg>
                </div>
                <h1>I miei Appuntamenti</h1>
                <span class="offline-badge">
                    <span class="offline-dot"></span>
                    Offline
                </span>
            </div>
            <div class="header-actions">
                <div class="search-box">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.35-4.35" />
                    </svg>
                    <input type="text" id="searchInput" placeholder="Cerca appuntamenti...">
                </div>
                <select id="sheetFilter" class="form-control filter-select">
                    <option value="">Tutti gli anni</option>
                </select>
                <div class="status-filter-group">
                    <button class="status-btn active" data-status="pending">
                        <span class="status-dot dot-pending"></span>
                        In attesa
                    </button>
                    <button class="status-btn" data-status="completed">
                        <span class="status-dot dot-completed"></span>
                        Completati
                    </button>
                    <button class="status-btn" data-status="cancelled">
                        <span class="status-dot dot-cancelled"></span>
                        Annullati
                    </button>
                </div>
                <button id="addBtn" class="btn btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    Nuovo
                </button>
            </div>
        </header>

        <div class="stats-bar" id="statsBar">
            <div class="stat-item">
                <span class="stat-num" id="statTotal">0</span>
                <span class="stat-label">Totali</span>
            </div>
            <div class="stat-item">
                <span class="stat-num stat-pending" id="statPending">0</span>
                <span class="stat-label">In attesa</span>
            </div>
            <div class="stat-item">
                <span class="stat-num stat-completed" id="statCompleted">0</span>
                <span class="stat-label">Completati</span>
            </div>
            <div class="stat-item">
                <span class="stat-num stat-today" id="statToday">0</span>
                <span class="stat-label">Oggi</span>
            </div>
        </div>

        <div class="appointments-grid" id="appointmentsGrid">
            <div class="empty-state">
                <div class="loader"></div>
                <p>Caricamento...</p>
            </div>
        </div>
    </div>

    <!-- Modal Add/Edit -->
    <div class="modal" id="appointmentModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Nuovo Appuntamento</h2>
                <button class="modal-close" id="closeModalBtn">&times;</button>
            </div>
            <form id="appointmentForm">
                <div class="form-group">
                    <label for="title">Titolo</label>
                    <input type="text" id="title" name="title" class="form-control" required
                        placeholder="Es: Visita medica">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="date">Data</label>
                        <input type="date" id="date" name="date" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="time">Ora</label>
                        <input type="time" id="time" name="time" class="form-control" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="description">Descrizione</label>
                    <textarea id="description" name="description" class="form-control" rows="3"
                        placeholder="Aggiungi dettagli..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="status">Stato</label>
                        <select id="status" name="status" class="form-control">
                            <option value="pending">In attesa</option>
                            <option value="completed">Completato</option>
                            <option value="cancelled">Annullato</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="source_sheet">Anno / Foglio</label>
                        <input type="text" id="source_sheet" name="source_sheet" class="form-control"
                            placeholder="Es: 2026">
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Annulla</button>
                    <button type="submit" class="btn btn-primary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                            <polyline points="17 21 17 13 7 13 7 21" />
                            <polyline points="7 3 7 8 15 8" />
                        </svg>
                        Salva
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Confirm Delete Modal -->
    <div class="modal" id="deleteModal">
        <div class="modal-content modal-small">
            <div class="delete-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="15" y1="9" x2="9" y2="15" />
                    <line x1="9" y1="9" x2="15" y2="15" />
                </svg>
            </div>
            <h3>Eliminare questo appuntamento?</h3>
            <p class="delete-subtitle">Questa azione non può essere annullata.</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancelDeleteBtn">Annulla</button>
                <button class="btn btn-danger" id="confirmDeleteBtn">Elimina</button>
            </div>
        </div>
    </div>

    <!-- Hidden file input for import -->
    <input type="file" id="importFileInput" accept=".json" style="display:none">

    <!-- Import Mode Modal -->
    <div class="modal" id="importModal">
        <div class="modal-content modal-small">
            <div class="delete-icon" style="color:#3F51B5">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#3F51B5" stroke-width="1.5">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="7 10 12 15 17 10" />
                    <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
            </div>
            <h3>Importa Dati</h3>
            <p class="delete-subtitle">Come vuoi importare i dati?</p>
            <div class="modal-actions" style="flex-direction:column;gap:0.5rem">
                <button class="btn btn-primary" id="importMergeBtn" style="width:100%">➕ Aggiungi ai dati
                    esistenti</button>
                <button class="btn btn-danger" id="importReplaceBtn" style="width:100%">🔄 Sostituisci tutti i
                    dati</button>
                <button class="btn btn-secondary" id="importCancelBtn" style="width:100%">Annulla</button>
            </div>
        </div>
    </div>

    <!-- Toast notification -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="data.js"></script>
    <script src="app.js"></script>
    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('SW registered:', reg.scope))
                .catch(err => console.log('SW error:', err));
        }
    </script>
</body>

</html>
