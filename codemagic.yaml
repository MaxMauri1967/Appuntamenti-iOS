workflows:
  appuntamenti-ios:
    name: Appuntamenti iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    integrations:
      app_store_connect: SportBody

    environment:
      vars:
        XCODE_SCHEME: "Appuntamenti"
      xcode: latest
      cocoapods: default

    scripts:
      - name: Set up code signing
        script: |
          openssl req -nodes -newkey rsa:2048 -keyout ~/certificate_key.pem -out ~/certificate_request.pem -subj "/C=IT"
          keychain initialize
      
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files \
            "com.appuntamenti.app" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=~/certificate_key.pem
      
      - name: Set up signing certificate
        script: |
          keychain add-certificates
      
      - name: Set up provisioning profiles
        script: |
          xcode-project use-profiles
      
      - name: Build archive
        script: |
          xcode-project build-ipa \
            --project "Appuntamenti-Vuota/Appuntamenti.xcodeproj" \
            --scheme "Appuntamenti" \
            --archive-flags="-destination 'generic/platform=iOS'"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - build/ios/xcarchive/*.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

